version: '3.9'
services:
  app:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      # IMPORTANT: Change these credentials before any non-local deployment
      POSTGRES_USER: refkit
      POSTGRES_PASSWORD: refkit
      POSTGRES_DB: refkit
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U refkit"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
